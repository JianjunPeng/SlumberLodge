{% extends 'base.html' %}

{% block title %}Book a Room - Slumber Lodge{% endblock %}

{% block content %}
<div class="bg-gray-50 py-12 flex-grow flex flex-col items-center justify-center">
    <div class="max-w-4xl w-full mx-auto px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Book Your Stay</h1>
            <p class="text-lg text-gray-600">Check availability and secure your room instantly.</p>
        </div>
        
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="p-8 md:p-12">
                <form 
                    hx-post="{% url 'check_availability' %}" 
                    hx-target="#availability-results" 
                    hx-indicator="#loading"
                    class="space-y-6"
                >
                    {% csrf_token %}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Room Type</label>
                            <select name="room_type" required class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary focus:border-primary block p-3">
                                {% for rt in room_types %}
                                    <option value="{{ rt.id }}" {% if selected_room_id == rt.id|stringformat:"s" %}selected{% endif %}>
                                        {{ rt.name }} (${{ rt.base_price }}/night)
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Check-in Date</label>
                            <input type="date" name="check_in" value="{{ today }}" required min="{{ today }}" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary focus:border-primary block p-3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Check-out Date</label>
                            <input type="date" name="check_out" value="{{ tomorrow }}" required min="{{ tomorrow }}" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary focus:border-primary block p-3">
                        </div>
                    </div>
                    
                    <div class="flex justify-center mt-8">
                        <button type="submit" class="bg-primary hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center">
                            Check Availability
                            <svg id="loading" class="htmx-indicator w-5 h-5 ml-2 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Results Container -->
            <div id="availability-results" class="bg-gray-50 border-t border-gray-100 p-8 md:p-12 min-h-[150px] flex items-center justify-center">
                <p class="text-gray-500 text-center">Select your dates and room type to see availability and pricing.</p>
            </div>
        </div>
    </div>
</div>

<style>
    .htmx-indicator {
        display: none;
    }
    .htmx-request .htmx-indicator {
        display: inline-block;
    }
    .htmx-request.htmx-indicator {
        display: inline-block;
    }
</style>
{% endblock %}
